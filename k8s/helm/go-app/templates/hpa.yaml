apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.global.DEPLOY_NAME }}
  namespace: {{ .Values.global.NAMESPACE }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.global.DEPLOY_NAME }}
  minReplicas: {{ .Values.global.AUTOSCALE_MINIMO }}
  maxReplicas: {{ .Values.global.AUTOSCALE_MAXIMO }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.global.CPU_HPA }}
